name: Build Pure GKI Kernel 6.6 (AnyKernel3)

on:
  workflow_dispatch:
    inputs:
      manifest_branch:
        description: '谷歌 GKI 分支'
        required: true
        default: 'common-android15-6.6'

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    steps:
      - name: 强力清理磁盘空间
        run: |
          sudo docker image prune -a -f
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /usr/share/swift /usr/local/.ghcup /opt/pipx
          sudo apt-get clean
          df -h

      - name: 安装依赖工具
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl git python3 rsync zip
          mkdir -p ~/.bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/.bin/repo
          chmod a+rx ~/.bin/repo
          echo "$HOME/.bin" >> $GITHUB_PATH

      - name: 初始化并同步源码
        run: |
          sudo chown $USER /mnt
          mkdir -p /mnt/kernel_workspace && cd /mnt/kernel_workspace
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          repo init -u https://android.googlesource.com/kernel/manifest -b ${{ github.event.inputs.manifest_branch }} --depth=1
          repo sync -j$(nproc) --no-clone-bundle --no-tags

      - name: 注入内核配置
        run: |
          cd /mnt/kernel_workspace/common
          cat <<EOF >> arch/arm64/configs/gki_defconfig
          CONFIG_BPF_STREAM_PARSER=y
          CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y
          CONFIG_NETFILTER_XT_SET=y
          CONFIG_IP_SET=y
          CONFIG_IP_SET_MAX=65534
          CONFIG_IP_SET_BITMAP_IP=y
          CONFIG_IP_SET_BITMAP_IPMAC=y
          CONFIG_IP_SET_BITMAP_PORT=y
          CONFIG_IP_SET_HASH_IP=y
          CONFIG_IP_SET_HASH_IPMARK=y
          CONFIG_IP_SET_HASH_IPPORT=y
          CONFIG_IP_SET_HASH_IPPORTIP=y
          CONFIG_IP_SET_HASH_IPPORTNET=y
          CONFIG_IP_SET_HASH_IPMAC=y
          CONFIG_IP_SET_HASH_MAC=y
          CONFIG_IP_SET_HASH_NETPORTNET=y
          CONFIG_IP_SET_HASH_NET=y
          CONFIG_IP_SET_HASH_NETNET=y
          CONFIG_IP_SET_HASH_NETPORT=y
          CONFIG_IP_SET_HASH_NETIFACE=y
          CONFIG_IP_SET_LIST_SET=y
          CONFIG_IP6_NF_NAT=y
          CONFIG_IP6_NF_TARGET_MASQUERADE=y
          EOF

      - name: 编译内核
        run: |
          cd /mnt/kernel_workspace
          tools/bazel run //common:kernel_aarch64_dist -- --dist_dir=out/dist --lto=thin

      - name: 打包 AnyKernel3
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git
          rm -rf AnyKernel3/.git
          
          cp /mnt/kernel_workspace/out/dist/Image AnyKernel3/
          
          cd AnyKernel3
          sed -i 's/kernel.string=.*/kernel.string=Pure GKI 6.6 No-Root/' anykernel.sh
          sed -i 's/^do.devicecheck=.*/do.devicecheck=0/' anykernel.sh
          sed -i 's/^block=.*/block=auto;/' anykernel.sh
          sed -i 's/^is_slot_device=.*/is_slot_device=0;/' anykernel.sh
          zip -r9 ../AnyKernel3-GKI-6.6.zip *

      - name: 提取并上传产物
        uses: actions/upload-artifact@v4
        with:
          name: AnyKernel3-GKI-6.6-NoRoot
          path: AnyKernel3-GKI-6.6.zip
