name: Build OnePlus 13T Kernel (Force 6.6.121-4k)

on:
  workflow_dispatch:
    inputs:
      localversion:
        description: '内核版本后缀'
        required: true
        default: '-4k'

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    steps:
      - name: 强力清理磁盘空间
        run: |
          sudo docker image prune -a -f
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /usr/share/swift /usr/local/.ghcup /opt/pipx
          sudo apt-get clean

      - name: 检出当前仓库
        uses: actions/checkout@v4

      - name: 安装依赖工具
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl git python3 rsync zip dos2unix tree flex bison libssl-dev libelf-dev ccache
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/repo
          chmod a+x ~/repo
          sudo mv ~/repo /usr/local/bin/repo

      - name: 拉取 OnePlusOSS 内核源码
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          mkdir -p kernel_workspace && cd kernel_workspace
          
          repo init -u https://github.com/OnePlusOSS/kernel_manifest.git -b refs/heads/oneplus/sm8750 -m oneplus_13t_b.xml --depth=1
          repo sync kernel_platform/common kernel_platform/prebuilts/clang/host/linux-x86 kernel_platform/prebuilts/kernel-build-tools -c --force-sync --optimized-fetch --prune --no-tags --no-clone-bundle -j$(nproc --all)

      - name: 注入自定义内核配置并锁定版本号
        run: |
          cd kernel_workspace/kernel_platform/common
          
          # 1. 注入你上传的 config 文件
          if [ -f "$GITHUB_WORKSPACE/config" ]; then
             dos2unix $GITHUB_WORKSPACE/config
             echo "=== 正在注入自定义配置 ==="
             cat $GITHUB_WORKSPACE/config >> arch/arm64/configs/gki_defconfig
          else
             echo "错误：未在仓库根目录找到 config 文件"
             exit 1
          fi

          # 2. 强制锁定 Makefile 中的版本号为 6.6.121
          echo "=== 正在强制修改内核版本号 ==="
          sed -i 's/^VERSION = .*/VERSION = 6/' Makefile
          sed -i 's/^PATCHLEVEL = .*/PATCHLEVEL = 6/' Makefile
          sed -i 's/^SUBLEVEL = .*/SUBLEVEL = 121/' Makefile
          sed -i 's/^EXTRAVERSION =.*/EXTRAVERSION = /' Makefile

          # 3. 处理本地后缀 (去掉 git hash，加上 -4k)
          sed -i 's/${scm_version}//' scripts/setlocalversion
          sed -i 's/-4k//g' arch/arm64/configs/gki_defconfig
          echo "CONFIG_LOCALVERSION=\"${{ github.event.inputs.localversion }}\"" >> arch/arm64/configs/gki_defconfig
          
          # 4. 禁用 defconfig 检查
          sed -i 's/check_defconfig//' build.config.gki

      - name: 编译内核
        run: |
          cd kernel_workspace/kernel_platform/common
          export PATH="$GITHUB_WORKSPACE/kernel_workspace/kernel_platform/prebuilts/clang/host/linux-x86/clang-r510928/bin:$GITHUB_WORKSPACE/kernel_workspace/kernel_platform/prebuilts/kernel-build-tools/linux-x86/bin:$PATH"

          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
          CC="clang" PAHOLE=pahole LD=ld.lld HOSTLD=ld.lld \
          O=out gki_defconfig

          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
          CC="clang" PAHOLE=pahole LD=ld.lld HOSTLD=ld.lld KCFLAGS+=-O2 KCFLAGS+=-Wno-error \
          O=out Image

      - name: 验证版本号并打包 AnyKernel3
        run: |
          # 检查编译出的内核版本字符串是否正确
          KERNEL_STR=$(strings kernel_workspace/kernel_platform/common/out/arch/arm64/boot/Image | grep "Linux version 6.6.121" | head -n 1)
          echo "编译出的内核版本为: $KERNEL_STR"
          
          git clone https://github.com/osm0sis/AnyKernel3.git --depth=1
          rm -rf AnyKernel3/.git
          
          cp kernel_workspace/kernel_platform/common/out/arch/arm64/boot/Image AnyKernel3/
          
          cd AnyKernel3
          sed -i 's/kernel.string=.*/kernel.string=OnePlus 13T 6.6.121-4k/' anykernel.sh
          sed -i 's/^do.devicecheck=.*/do.devicecheck=0/' anykernel.sh
          sed -i 's/^block=.*/block=\/dev\/block\/by-name\/boot;/' anykernel.sh
          sed -i 's/^is_slot_device=.*/is_slot_device=auto;/' anykernel.sh
          
          zip -r9 ../AnyKernel3-OnePlus-13T-6.6.121-4k.zip *

      - name: 提取并上传产物
        uses: actions/upload-artifact@v4
        with:
          name: AnyKernel3-OnePlus-13T-6.6.121-4k
          path: AnyKernel3-OnePlus-13T-6.6.121-4k.zip
